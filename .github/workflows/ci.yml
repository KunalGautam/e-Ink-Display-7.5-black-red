name: E-Ink Dashboard CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go-server/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libraqm-dev

      - name: Install Python Layout Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests

      - name: Tidy Go Modules
        run: |
          cd go-server
          go mod tidy

      - name: Run Package Tests
        run: |
          cd go-server
          go test ./... -v
