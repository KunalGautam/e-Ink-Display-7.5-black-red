<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ink Multi-Canvas Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: rgba(22, 28, 45, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #ef4444;
            --accent-hover: #dc2626;
            --success-color: #10b981;
            --input-bg: rgba(15, 17, 26, 0.6);
            --font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(22, 28, 45, 0.8) 0px, transparent 50%);
            color: var(--text-color);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo-section h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-section h1 span {
            color: var(--accent-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            font-family: var(--font-family);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .btn-danger:hover {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .btn-success {
            background-color: var(--success-color);
            color: #ffffff;
        }

        .container {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 2rem;
            max-width: 1920px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Canvas List Styling */
        .canvas-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .canvas-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .canvas-item:hover, .canvas-item.active {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .canvas-item.active {
            font-weight: 600;
        }

        .canvas-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Main Workspace Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        @media (max-width: 1200px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .preview-pane {
            width: 100%;
            background-color: #1a1e2e;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
            padding: 20px;
            min-height: 350px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            background-color: rgba(22, 28, 45, 0.8);
        }

        /* Widget items list inside profile details */
        .widget-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            margin-bottom: 6px;
            cursor: pointer;
        }

        .widget-item-row:hover {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Toast message */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .toast {
            background: rgba(22, 28, 45, 0.95);
            border: 1px solid var(--card-border);
            border-left: 4px solid var(--success-color);
            padding: 0.8rem 1.2rem;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        footer {
            padding: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            background: rgba(15, 17, 26, 0.8);
            margin-top: auto;
        }

        /* Drag and resize overlays */
        .widget-drag-box {
            box-sizing: border-box;
            transition: border-color 0.15s, background-color 0.15s;
        }
        .widget-drag-box:hover, .widget-drag-box.selected {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.15) !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <h1>e-Ink <span>Multi-Canvas</span> Portal</h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="loadCanvases()">
                🔄 Refresh Data
            </button>
            <button class="btn btn-danger" onclick="restartServer()">
                ⚠️ Restart Server
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar: Canvas List & Profile Creators -->
        <div class="card">
            <div class="card-title">
                <span>📁 Canvas Profiles</span>
            </div>
            <div class="canvas-list" id="canvasListContainer">
                <!-- Canvases list dynamically populated -->
            </div>
            
            <div class="card-title" style="margin-top: 1rem;">
                <span>➕ Add Canvas</span>
            </div>
            <form id="canvasForm" onsubmit="createCanvas(event)">
                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="new_canvas_id">Canvas ID (Unique)</label>
                    <input type="text" id="new_canvas_id" required placeholder="e.g. kitchen_display">
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="device_template">Device Template</label>
                    <select id="device_template" onchange="toggleCustomDeviceFields()">
                        <optgroup label="Large Screens (5.65&quot; - 13.3&quot;)">
                            <option value="ws_5in65_f" data-width="600" data-height="448" data-mode="bwr">5.65inch e-Paper (F) [600x448]</option>
                            <option value="ws_5in83" data-width="648" data-height="480" data-mode="mono">5.83inch e-Paper HAT [648x480]</option>
                            <option value="ws_5in83_b" data-width="648" data-height="480" data-mode="bwr">5.83inch e-Paper HAT (B) [648x480]</option>
                            <option value="ws_5in83_c" data-width="648" data-height="480" data-mode="bwr">5.83inch e-Paper HAT (C) [648x480]</option>
                            <option value="ws_6in" data-width="800" data-height="600" data-mode="mono">6inch e-Paper HAT [800x600]</option>
                            <option value="ws_6in_hd" data-width="1024" data-height="758" data-mode="mono">6inch HD e-Paper HAT [1024x758]</option>
                            <option value="ws_7in5" data-width="800" data-height="480" data-mode="mono">7.5inch e-Paper HAT [800x480]</option>
                            <option value="ws_7in5_b" data-width="800" data-height="480" data-mode="bwr">7.5inch e-Paper HAT (B) [800x480]</option>
                            <option value="ws_7in5_c" data-width="800" data-height="480" data-mode="bwr">7.5inch e-Paper HAT (C) [800x480]</option>
                            <option value="ws_7in5_h" data-width="640" data-height="384" data-mode="bwr">7.5inch e-Paper HAT (H) [640x384]</option>
                            <option value="ws_7in5_hd" data-width="880" data-height="528" data-mode="mono">7.5inch HD e-Paper HAT [880x528]</option>
                            <option value="ws_7in5_hd_b" data-width="880" data-height="528" data-mode="bwr">7.5inch HD e-Paper (B) [880x528]</option>
                            <option value="ws_7in5_g" data-width="800" data-height="480" data-mode="mono">7.5inch e-Paper (G) [800x480]</option>
                            <option value="ws_7in8" data-width="1872" data-height="1404" data-mode="mono">7.8inch e-Paper HAT [1872x1404]</option>
                            <option value="ws_9in7" data-width="1200" data-height="825" data-mode="mono">9.7inch e-Paper HAT [1200x825]</option>
                            <option value="ws_10in2_g" data-width="960" data-height="640" data-mode="mono">10.2inch e-Paper (G) [960x640]</option>
                            <option value="ws_10in3" data-width="1872" data-height="1404" data-mode="mono">10.3inch e-Paper HAT [1872x1404]</option>
                            <option value="ws_10in3_d" data-width="1872" data-height="1404" data-mode="mono">10.3inch e-Paper (D) [1872x1404]</option>
                            <option value="ws_12in48" data-width="1304" data-height="984" data-mode="mono">12.48inch e-Paper [1304x984]</option>
                            <option value="ws_12in48_b" data-width="1304" data-height="984" data-mode="bwr">12.48inch e-Paper (B) [1304x984]</option>
                            <option value="ws_13in3" data-width="1600" data-height="1200" data-mode="mono">13.3inch e-Paper HAT [1600x1200]</option>
                            <option value="ws_13in3_b" data-width="1600" data-height="1200" data-mode="bwr">13.3inch e-Paper (B) [1600x1200]</option>
                            <option value="ws_13in3_k" data-width="1600" data-height="1200" data-mode="bwr">13.3inch e-Paper (K) [1600x1200]</option>
                        </optgroup>
                        <optgroup label="Medium Screens (2.6&quot; - 4.3&quot;)">
                            <option value="ws_2in66" data-width="296" data-height="152" data-mode="mono">2.66inch e-Paper [296x152]</option>
                            <option value="ws_2in66_b" data-width="296" data-height="152" data-mode="bwr">2.66inch e-Paper (B) [296x152]</option>
                            <option value="ws_2in7" data-width="264" data-height="176" data-mode="mono">2.7inch e-Paper HAT [264x176]</option>
                            <option value="ws_2in7_b" data-width="264" data-height="176" data-mode="bwr">2.7inch e-Paper (B) [264x176]</option>
                            <option value="ws_2in9" data-width="296" data-height="128" data-mode="mono">2.9inch e-Paper HAT [296x128]</option>
                            <option value="ws_2in9_b" data-width="296" data-height="128" data-mode="bwr">2.9inch e-Paper (B) [296x128]</option>
                            <option value="ws_2in9_c" data-width="296" data-height="128" data-mode="bwr">2.9inch e-Paper (C) [296x128]</option>
                            <option value="ws_2in9_d" data-width="296" data-height="128" data-mode="mono">2.9inch e-Paper (D) [296x128]</option>
                            <option value="ws_3in52_b" data-width="360" data-height="240" data-mode="bwr">3.52inch e-Paper (B) [360x240]</option>
                            <option value="ws_3in6_e" data-width="240" data-height="416" data-mode="bwr">3.6inch e-Paper (E) [240x416]</option>
                            <option value="ws_3in7" data-width="480" data-height="280" data-mode="mono">3.7inch e-Paper HAT [480x280]</option>
                            <option value="ws_4in01_f" data-width="640" data-height="400" data-mode="bwr">4.01inch e-Paper (F) [640x400]</option>
                            <option value="ws_4in2" data-width="400" data-height="300" data-mode="mono">4.2inch e-Paper HAT [400x300]</option>
                            <option value="ws_4in2_b" data-width="400" data-height="300" data-mode="bwr">4.2inch e-Paper (B) [400x300]</option>
                            <option value="ws_4in2_c" data-width="400" data-height="300" data-mode="bwr">4.2inch e-Paper (C) [400x300]</option>
                            <option value="ws_4in2_g" data-width="400" data-height="300" data-mode="mono">4.2inch e-Paper (G) [400x300]</option>
                            <option value="ws_4in3_uart" data-width="800" data-height="600" data-mode="mono">4.3inch UART Module [800x600]</option>
                        </optgroup>
                        <optgroup label="Small Screens (1.02&quot; - 2.2&quot;)">
                            <option value="ws_1in54" data-width="200" data-height="200" data-mode="mono">1.54inch e-Paper [200x200]</option>
                            <option value="ws_1in54_b" data-width="200" data-height="200" data-mode="bwr">1.54inch e-Paper (B) [200x200]</option>
                            <option value="ws_1in54_c" data-width="200" data-height="200" data-mode="bwr">1.54inch e-Paper (C) [200x200]</option>
                            <option value="ws_1in54_g" data-width="200" data-height="200" data-mode="mono">1.54inch e-Paper (G) [200x200]</option>
                            <option value="ws_1in9_seg" data-width="152" data-height="152" data-mode="mono">1.9inch Segment Module [152x152]</option>
                            <option value="ws_2in13" data-width="250" data-height="122" data-mode="mono">2.13inch e-Paper HAT [250x122]</option>
                            <option value="ws_2in13_plus" data-width="250" data-height="122" data-mode="mono">2.13inch e-Paper HAT+ [250x122]</option>
                            <option value="ws_2in13_b" data-width="250" data-height="122" data-mode="bwr">2.13inch e-Paper (B) [250x122]</option>
                            <option value="ws_2in13_c" data-width="250" data-height="122" data-mode="bwr">2.13inch e-Paper (C) [250x122]</option>
                            <option value="ws_2in13_d" data-width="250" data-height="122" data-mode="mono">2.13inch e-Paper (D) [250x122]</option>
                            <option value="ws_2in13_touch" data-width="250" data-height="122" data-mode="mono">2.13inch Touch HAT [250x122]</option>
                            <option value="ws_2in15_b" data-width="250" data-height="122" data-mode="bwr">2.15inch e-Paper (B) [250x122]</option>
                            <option value="ws_2in15_g" data-width="250" data-height="122" data-mode="mono">2.15inch e-Paper (G) [250x122]</option>
                        </optgroup>
                        <option value="custom">Custom Dimensions...</option>
                    </select>
                </div>
                <div id="custom_device_dims" style="display: none;">
                    <div class="form-grid" style="margin-bottom: 8px;">
                        <div class="form-group">
                            <label>Width</label>
                            <input type="number" id="custom_width" value="800">
                        </div>
                        <div class="form-group">
                            <label>Height</label>
                            <input type="number" id="custom_height" value="480">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 8px;">
                        <label>Color Mode</label>
                        <select id="custom_color_mode">
                            <option value="mono">Monochrome (Black/White)</option>
                            <option value="bwr">Black / White / Red (3-Color)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="canvas_timezone">Timezone</label>
                    <input type="text" id="canvas_timezone" value="Asia/Kolkata">
                </div>

                <div style="border-top: 1px solid var(--card-border); margin: 12px 0 8px 0; padding-top: 8px;">
                    <span style="font-size: 0.75rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase;">Canvas MQTT Settings</span>
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="canvas_mqtt_broker">MQTT Broker URL</label>
                    <input type="text" id="canvas_mqtt_broker" placeholder="tcp://100.101.102.4:1883">
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="canvas_mqtt_username">MQTT Username</label>
                    <input type="text" id="canvas_mqtt_username" placeholder="Optional">
                </div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="canvas_mqtt_password">MQTT Password</label>
                    <input type="password" id="canvas_mqtt_password" placeholder="Optional">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create/Update Canvas</button>
            </form>
        </div>

        <!-- Main Workspace: Canvas Workspace and Widget Details Editor -->
        <div class="workspace" id="workspaceContainer" style="display: none;">
            <!-- Center Panel: Preview and widget items lists -->
            <div class="card">
                <div class="card-title">
                    <span>🖥️ Canvas Workspace: <span id="currentCanvasTitle" style="color: var(--accent-color);"></span></span>
                    <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.75rem;" onclick="deleteCurrentCanvas()">Delete Canvas</button>
                </div>

                <div class="preview-pane">
                    <div id="canvasWorkspace" style="position: relative; background: #ffffff; background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 20px 20px; transform-origin: top left; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                        <img id="previewImage" src="" alt="Render preview loading..." style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; image-rendering: pixelated;">
                        <div id="widgetsOverlay" style="position: absolute; top:0; left:0; width:100%; height:100%; overflow: hidden;"></div>
                    </div>
                </div>

                <div class="card-title" style="margin-top: 1rem;">
                    <span>🧩 Configured Widgets</span>
                    <button class="btn btn-success" style="padding: 0.3rem 0.8rem; font-size: 0.75rem;" onclick="addNewWidgetInit()">+ Add Widget</button>
                </div>
                <div id="widgetListContainer">
                    <!-- Widget list rows -->
                </div>
            </div>

            <!-- Right Panel: Widget Parameter Editor Form -->
            <div class="card" id="widgetEditorCard" style="display: none;">
                <div class="card-title">
                    <span id="widgetEditorTitle">✏️ Widget Parameter Editor</span>
                </div>
                <form id="widgetForm" onsubmit="saveWidget(event)">
                    <input type="hidden" id="widget_id">
                    <div class="form-grid">
                        <div class="form-group form-group-full">
                            <label for="widget_type">Widget Type</label>
                            <select id="widget_type" onchange="toggleWidgetTypeFields()">
                                <option value="calendar">Calendar (Monthly Grid)</option>
                                <option value="datetime">Date / Time Display</option>
                                <option value="text">Text (Static / MQTT Feed)</option>
                                <option value="notes">Notes List (MQTT Array)</option>
                                <option value="emails">Emails List (MQTT Array)</option>
                                <option value="weather">Weather (MQTT Payload)</option>
                                <option value="image">Image (URL/Base64 scaled)</option>
                                <option value="container">Container (Nested Grid)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="w_x">Position X</label>
                            <input type="number" id="w_x" required min="0" oninput="updateBoxFromForm()">
                        </div>
                        <div class="form-group">
                            <label for="w_y">Position Y</label>
                            <input type="number" id="w_y" required min="0" oninput="updateBoxFromForm()">
                        </div>
                        <div class="form-group">
                            <label for="w_w">Width</label>
                            <input type="number" id="w_w" required min="1" oninput="updateBoxFromForm()">
                        </div>
                        <div class="form-group">
                            <label for="w_h">Height</label>
                            <input type="number" id="w_h" required min="1" oninput="updateBoxFromForm()">
                        </div>

                        <div class="form-group">
                            <label for="w_fg">Foreground Hex</label>
                            <input type="text" id="w_fg" value="#000000" placeholder="#000000">
                        </div>
                        <div class="form-group">
                            <label for="w_bg">Background Hex</label>
                            <input type="text" id="w_bg" value="" placeholder="Transparent">
                        </div>

                        <div class="form-group">
                            <label for="w_border_width">Border Width</label>
                            <input type="number" id="w_border_width" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label for="w_border_color">Border Color</label>
                            <input type="text" id="w_border_color" placeholder="Hex color">
                        </div>

                        <div class="form-group form-group-full">
                            <label for="w_font_url">Google Font URL</label>
                            <input type="text" id="w_font_url" placeholder="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700">
                        </div>
                        <div class="form-group">
                            <label for="w_font_size">Font Size</label>
                            <input type="number" id="w_font_size" value="14" step="0.5">
                        </div>
                        <div class="form-group">
                            <label for="w_font_weight">Font Weight</label>
                            <select id="w_font_weight">
                                <option value="Regular">Regular</option>
                                <option value="Bold">Bold</option>
                            </select>
                        </div>

                        <div class="form-group form-group-full">
                            <label for="w_mqtt_broker">MQTT Broker URL</label>
                            <input type="text" id="w_mqtt_broker" placeholder="Falls back to canvas MQTT settings">
                        </div>
                        <div class="form-group form-group-full">
                            <label for="w_mqtt_topic">MQTT Topic Name</label>
                            <input type="text" id="w_mqtt_topic" placeholder="home/eink/widget_data">
                        </div>

                        <!-- Calendar Configuration Helper -->
                        <div class="form-group form-group-full" id="calendar_builder_group" style="display: none; border-top: 1px dashed var(--card-border); padding-top: 1rem; margin-top: 0.5rem;">
                            <label style="color: var(--accent-color); font-weight: bold; margin-bottom: 0.5rem;">📅 Calendar Settings</label>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="cal_circle_offset_x">Circle X Offset (px)</label>
                                    <input type="number" id="cal_circle_offset_x" value="0" step="0.5" oninput="updateCalendarJSON()">
                                </div>
                                <div class="form-group">
                                    <label for="cal_circle_offset_y">Circle Y Offset (px)</label>
                                    <input type="number" id="cal_circle_offset_y" value="0" step="0.5" oninput="updateCalendarJSON()">
                                </div>
                                <div class="form-group">
                                    <label for="cal_circle_radius">Circle Radius (px)</label>
                                    <input type="number" id="cal_circle_radius" value="12" min="1" step="0.5" oninput="updateCalendarJSON()">
                                </div>
                                <div class="form-group">
                                    <label for="cal_text_offset_x">Text X Offset (px)</label>
                                    <input type="number" id="cal_text_offset_x" value="0" step="0.5" oninput="updateCalendarJSON()">
                                </div>
                                <div class="form-group">
                                    <label for="cal_text_offset_y">Text Y Offset (px)</label>
                                    <input type="number" id="cal_text_offset_y" value="0" step="0.5" oninput="updateCalendarJSON()">
                                </div>
                            </div>
                        </div>

                        <!-- Container Grid Builder Section -->
                        <div class="form-group form-group-full" id="container_builder_group" style="display: none; border-top: 1px dashed var(--card-border); padding-top: 1rem; margin-top: 0.5rem;">
                            <label style="color: var(--accent-color); font-weight: bold; margin-bottom: 0.5rem;">📦 Container Grid Builder</label>
                            <div class="form-grid" style="margin-bottom: 0.8rem;">
                                <div class="form-group">
                                    <label for="c_grid_cols">Grid Columns</label>
                                    <input type="number" id="c_grid_cols" value="2" min="1" max="4" oninput="buildContainerForm()">
                                </div>
                                <div class="form-group">
                                    <label for="c_grid_rows">Grid Rows</label>
                                    <input type="number" id="c_grid_rows" value="1" min="1" max="2" oninput="buildContainerForm()">
                                </div>
                                <div class="form-group form-group-full">
                                    <label for="c_grid_gap">Gap (px)</label>
                                    <input type="number" id="c_grid_gap" value="8" min="0" oninput="updateContainerJSON()">
                                </div>
                            </div>
                            <div id="container_children_slots" style="display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 4px;">
                                <!-- Dynamically generated slots -->
                            </div>
                        </div>

                        <div class="form-group form-group-full" id="custom_config_group">
                            <label for="w_custom_config">Custom Parameters (JSON)</label>
                            <textarea id="w_custom_config" rows="3" placeholder='{"format": "15:04"}'></textarea>
                        </div>
                    </div>
                    <div style="margin-top: 1.2rem; display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Save Widget</button>
                        <button type="button" class="btn btn-danger" id="btnDeleteWidget" onclick="deleteWidget()">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <footer>
        Multi-Canvas e-Paper Dashboard Server Portal &copy; 2026
    </footer>

    <script>
        let currentCanvasID = "";
        let activeWidgets = [];
        let canvasWidth = 800;
        let canvasHeight = 480;

        window.onload = function() {
            loadCanvases();
            window.addEventListener('resize', resizeWorkspace);
        };

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            container.innerHTML = `<div class="toast">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 3000);
        }

        function toggleCustomDeviceFields() {
            const temp = document.getElementById('device_template').value;
            const customDiv = document.getElementById('custom_device_dims');
            customDiv.style.display = (temp === 'custom') ? 'block' : 'none';
        }

        function loadCanvases() {
            fetch('/api/canvas')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('canvasListContainer');
                    container.innerHTML = '';
                    data.forEach(c => {
                        const div = document.createElement('div');
                        div.className = `canvas-item ${c.id === currentCanvasID ? 'active' : ''}`;
                        div.onclick = () => selectCanvas(c.id, c.width, c.height, c);
                        div.innerHTML = `
                            <div>
                                <div>${c.id}</div>
                                <div class="canvas-meta">${c.width}x${c.height} | ${c.color_mode}</div>
                            </div>
                            <span class="canvas-meta">➔</span>
                        `;
                        container.appendChild(div);
                    });
                    if (currentCanvasID) {
                        const cur = data.find(c => c.id === currentCanvasID);
                        if (cur) selectCanvas(cur.id, cur.width, cur.height, cur);
                    } else if (data.length > 0) {
                        selectCanvas(data[0].id, data[0].width, data[0].height, data[0]);
                    }
                })
                .catch(err => showToast("Error loading canvas list: " + err));
        }

        function resizeWorkspace() {
            const pane = document.querySelector('.preview-pane');
            const ws = document.getElementById('canvasWorkspace');
            if (!ws || !pane) return;

            ws.style.width = canvasWidth + 'px';
            ws.style.height = canvasHeight + 'px';

            const paneWidth = pane.clientWidth - 40; // padding
            const scale = Math.min(paneWidth / canvasWidth, 1.0);

            ws.style.transform = `scale(${scale})`;
            pane.style.height = (canvasHeight * scale + 40) + 'px';
        }

        function selectCanvas(id, w, h, cData) {
            currentCanvasID = id;
            canvasWidth = w || 800;
            canvasHeight = h || 480;
            document.getElementById('currentCanvasTitle').innerText = id;
            document.getElementById('workspaceContainer').style.display = 'grid';
            
            // Highlight list item
            const items = document.querySelectorAll('.canvas-item');
            items.forEach(el => el.classList.remove('active'));
            
            resizeWorkspace();

            // Load preview image
            const previewImg = document.getElementById('previewImage');
            previewImg.src = `/canvas/${id}/preview?t=` + new Date().getTime();

            // Fill canvas settings values if edit details provided
            if (cData) {
                document.getElementById('new_canvas_id').value = cData.id || '';
                document.getElementById('canvas_timezone').value = cData.timezone || 'Asia/Kolkata';
                document.getElementById('canvas_mqtt_broker').value = cData.mqtt_broker || '';
                document.getElementById('canvas_mqtt_username').value = cData.mqtt_username || '';
                document.getElementById('canvas_mqtt_password').value = cData.mqtt_password || '';
            }

            // Load widgets
            fetch(`/api/canvas/${id}`)
                .then(res => res.json())
                .then(data => {
                    activeWidgets = data;
                    const wContainer = document.getElementById('widgetListContainer');
                    wContainer.innerHTML = '';
                    if (!data || data.length === 0) {
                        wContainer.innerHTML = '<div style="font-size:0.85rem;color:var(--text-muted);">No widgets configured. Click Add Widget to place your first widget!</div>';
                    } else {
                        data.forEach(w => {
                            const div = document.createElement('div');
                            div.className = 'widget-item-row';
                            div.onclick = () => selectWidget(w.id);
                            div.innerHTML = `
                                <div>
                                    <strong style="text-transform:capitalize;">${w.type} (${w.id})</strong>
                                    <div style="font-size:0.75rem;color:var(--text-muted);">X: ${w.x}, Y: ${w.y} | Size: ${w.width}x${w.height}</div>
                                </div>
                                <span style="font-size:0.8rem;color:var(--text-muted);">Edit</span>
                            `;
                            wContainer.appendChild(div);
                        });
                    }
                    renderWidgetOverlays();
                });
        }

        function renderWidgetOverlays() {
            const overlay = document.getElementById('widgetsOverlay');
            overlay.innerHTML = '';

            activeWidgets.forEach(w => {
                const box = document.createElement('div');
                box.id = "overlay_" + w.id;
                box.className = 'widget-drag-box';
                box.style.position = 'absolute';
                box.style.left = w.x + 'px';
                box.style.top = w.y + 'px';
                box.style.width = w.width + 'px';
                box.style.height = w.height + 'px';
                box.style.border = '2px dashed rgba(239, 68, 68, 0.4)';
                box.style.background = 'rgba(239, 68, 68, 0.03)';
                box.style.cursor = 'move';
                box.style.display = 'flex';
                box.style.alignItems = 'center';
                box.style.justifyContent = 'center';
                box.style.color = 'rgba(0,0,0,0.6)';
                box.style.fontSize = '11px';
                box.style.fontWeight = 'bold';
                box.innerText = w.id;

                // Add resizing handle at bottom-right
                const handle = document.createElement('div');
                handle.style.position = 'absolute';
                handle.style.bottom = '0';
                handle.style.right = '0';
                handle.style.width = '10px';
                handle.style.height = '10px';
                handle.style.background = 'rgba(239, 68, 68, 0.6)';
                handle.style.cursor = 'se-resize';
                box.appendChild(handle);

                // Mouse Dragging Logic
                box.onmousedown = function(e) {
                    if (e.target === handle) return;
                    e.preventDefault();
                    selectWidget(w.id);

                    // Add visual highlight
                    document.querySelectorAll('.widget-drag-box').forEach(el => el.classList.remove('selected'));
                    box.classList.add('selected');

                    let startX = e.clientX;
                    let startY = e.clientY;
                    let origX = w.x;
                    let origY = w.y;

                    document.onmousemove = function(moveEv) {
                        let scale = Math.min((document.querySelector('.preview-pane').clientWidth - 40) / canvasWidth, 1.0);
                        let dx = (moveEv.clientX - startX) / scale;
                        let dy = (moveEv.clientY - startY) / scale;
                        let newX = Math.max(0, Math.min(canvasWidth - w.width, Math.round(origX + dx)));
                        let newY = Math.max(0, Math.min(canvasHeight - w.height, Math.round(origY + dy)));
                        
                        box.style.left = newX + 'px';
                        box.style.top = newY + 'px';
                        
                        document.getElementById('w_x').value = newX;
                        document.getElementById('w_y').value = newY;
                    };

                    document.onmouseup = function() {
                        document.onmousemove = null;
                        document.onmouseup = null;
                        w.x = parseInt(box.style.left);
                        w.y = parseInt(box.style.top);
                        saveWidgetQuietly(w);
                    };
                };

                // Mouse Resizing Logic
                handle.onmousedown = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    selectWidget(w.id);

                    let startX = e.clientX;
                    let startY = e.clientY;
                    let origW = w.width;
                    let origH = w.height;

                    document.onmousemove = function(moveEv) {
                        let scale = Math.min((document.querySelector('.preview-pane').clientWidth - 40) / canvasWidth, 1.0);
                        let dx = (moveEv.clientX - startX) / scale;
                        let dy = (moveEv.clientY - startY) / scale;
                        let newW = Math.max(10, Math.min(canvasWidth - w.x, Math.round(origW + dx)));
                        let newH = Math.max(10, Math.min(canvasHeight - w.y, Math.round(origH + dy)));
                        
                        box.style.width = newW + 'px';
                        box.style.height = newH + 'px';
                        
                        document.getElementById('w_w').value = newW;
                        document.getElementById('w_h').value = newH;
                    };

                    document.onmouseup = function() {
                        document.onmousemove = null;
                        document.onmouseup = null;
                        w.width = parseInt(box.style.width);
                        w.height = parseInt(box.style.height);
                        saveWidgetQuietly(w);
                    };
                };

                overlay.appendChild(box);
            });
        }

        function updateBoxFromForm() {
            const id = document.getElementById('widget_id').value;
            const box = document.getElementById('overlay_' + id);
            if (!box) return;

            const x = parseInt(document.getElementById('w_x').value) || 0;
            const y = parseInt(document.getElementById('w_y').value) || 0;
            const w = parseInt(document.getElementById('w_w').value) || 10;
            const h = parseInt(document.getElementById('w_h').value) || 10;

            box.style.left = x + 'px';
            box.style.top = y + 'px';
            box.style.width = w + 'px';
            box.style.height = h + 'px';
        }

        function saveWidgetQuietly(w) {
            fetch('/api/widget', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(w)
            })
            .then(res => res.json())
            .then(() => {
                const previewImg = document.getElementById('previewImage');
                previewImg.src = `/canvas/${currentCanvasID}/preview?t=` + new Date().getTime();
            });
        }

        function createCanvas(event) {
            event.preventDefault();
            const id = document.getElementById('new_canvas_id').value;
            const templateSelect = document.getElementById('device_template');
            const template = templateSelect.value;
            const tz = document.getElementById('canvas_timezone').value;
            const broker = document.getElementById('canvas_mqtt_broker').value;
            const user = document.getElementById('canvas_mqtt_username').value;
            const pass = document.getElementById('canvas_mqtt_password').value;

            let bodyData = { id: id, device_type: template, timezone: tz, mqtt_broker: broker, mqtt_username: user, mqtt_password: pass };

            if (template === 'custom') {
                bodyData.width = parseInt(document.getElementById('custom_width').value);
                bodyData.height = parseInt(document.getElementById('custom_height').value);
                bodyData.color_mode = document.getElementById('custom_color_mode').value;
            } else {
                const selectedOpt = templateSelect.options[templateSelect.selectedIndex];
                bodyData.width = parseInt(selectedOpt.getAttribute('data-width')) || 800;
                bodyData.height = parseInt(selectedOpt.getAttribute('data-height')) || 480;
                bodyData.color_mode = selectedOpt.getAttribute('data-mode') || 'mono';
            }

            fetch('/api/canvas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            })
            .then(res => res.json())
            .then(data => {
                showToast("Canvas configurations updated/created!");
                currentCanvasID = id;
                loadCanvases();
            })
            .catch(err => showToast("Error updating/creating canvas: " + err));
        }

        function deleteCurrentCanvas() {
            if (!confirm("Are you sure you want to delete canvas " + currentCanvasID + "? All its widgets will be permanently deleted.")) return;
            fetch(`/api/canvas/${currentCanvasID}`, { method: 'DELETE' })
                .then(() => {
                    showToast("Canvas deleted successfully.");
                    currentCanvasID = "";
                    document.getElementById('workspaceContainer').style.display = 'none';
                    document.getElementById('widgetEditorCard').style.display = 'none';
                    loadCanvases();
                });
        }

        function addNewWidgetInit() {
            document.getElementById('widgetEditorTitle').innerText = "➕ Create New Widget";
            document.getElementById('widgetEditorCard').style.display = 'block';
            document.getElementById('widgetForm').reset();
            document.getElementById('widget_id').value = "widget_" + new Date().getTime();
            document.getElementById('btnDeleteWidget').style.display = 'none';
            document.getElementById('w_border_width').value = 0;
            document.getElementById('w_border_color').value = "";
            toggleWidgetTypeFields();
        }

        function selectWidget(id) {
            const w = activeWidgets.find(item => item.id === id);
            if (!w) return;

            document.getElementById('widgetEditorTitle').innerText = "✏️ Edit Widget: " + id;
            document.getElementById('widgetEditorCard').style.display = 'block';
            document.getElementById('btnDeleteWidget').style.display = 'inline-flex';

            document.getElementById('widget_id').value = w.id;
            document.getElementById('widget_type').value = w.type;
            document.getElementById('w_x').value = w.x;
            document.getElementById('w_y').value = w.y;
            document.getElementById('w_w').value = w.width;
            document.getElementById('w_h').value = w.height;
            document.getElementById('w_fg').value = w.color_fg;
            document.getElementById('w_bg').value = w.color_bg;
            document.getElementById('w_border_width').value = w.border_width || 0;
            document.getElementById('w_border_color').value = w.border_color || '';
            document.getElementById('w_font_url').value = w.font_url || '';
            document.getElementById('w_font_size').value = w.font_size;
            document.getElementById('w_font_weight').value = w.font_weight || 'Regular';
            document.getElementById('w_mqtt_broker').value = w.mqtt_broker || '';
            document.getElementById('w_mqtt_topic').value = w.mqtt_topic || '';
            document.getElementById('w_custom_config').value = w.custom_config || '';

            // Highlight drag box
            document.querySelectorAll('.widget-drag-box').forEach(el => el.classList.remove('selected'));
            const box = document.getElementById('overlay_' + id);
            if (box) box.classList.add('selected');

            toggleWidgetTypeFields();
        }

        function buildContainerForm(existingChildren = []) {
            const cols = parseInt(document.getElementById('c_grid_cols').value) || 1;
            const rows = parseInt(document.getElementById('c_grid_rows').value) || 1;
            const container = document.getElementById('container_children_slots');
            container.innerHTML = '';

            const numSlots = Math.min(cols * rows, 8);
            for (let i = 0; i < numSlots; i++) {
                const child = existingChildren[i] || {};
                const div = document.createElement('div');
                div.style.border = '1px solid var(--card-border)';
                div.style.padding = '10px';
                div.style.borderRadius = '6px';
                div.style.background = 'rgba(255,255,255,0.01)';
                div.style.marginBottom = '10px';
                div.innerHTML = `
                    <div style="font-weight: bold; font-size: 0.8rem; margin-bottom: 8px; color: var(--accent-color);">Cell Slot #${i+1}</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Widget Type</label>
                            <select class="c_child_type" data-slot="${i}" onchange="updateContainerJSON()">
                                <option value="calendar" ${child.type === 'calendar' ? 'selected' : ''}>Calendar</option>
                                <option value="datetime" ${child.type === 'datetime' ? 'selected' : ''}>Date / Time</option>
                                <option value="text" ${child.type === 'text' ? 'selected' : ''}>Text (Static / MQTT)</option>
                                <option value="notes" ${child.type === 'notes' ? 'selected' : ''}>Notes List</option>
                                <option value="emails" ${child.type === 'emails' ? 'selected' : ''}>Emails List</option>
                                <option value="weather" ${child.type === 'weather' ? 'selected' : ''}>Weather</option>
                                <option value="image" ${child.type === 'image' ? 'selected' : ''}>Image</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Custom Parameter (Format / URL / Text)</label>
                            <input type="text" class="c_child_config" data-slot="${i}" value='${child.custom_config || ''}' placeholder='e.g. {"format": "15:04"}' oninput="updateContainerJSON()">
                        </div>
                        <div class="form-group">
                            <label>Color FG</label>
                            <input type="text" class="c_child_fg" data-slot="${i}" value="${child.color_fg || ''}" placeholder="#000000" oninput="updateContainerJSON()">
                        </div>
                        <div class="form-group">
                            <label>Color BG</label>
                            <input type="text" class="c_child_bg" data-slot="${i}" value="${child.color_bg || ''}" placeholder="Transparent" oninput="updateContainerJSON()">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Google Font URL</label>
                            <input type="text" class="c_child_font_url" data-slot="${i}" value="${child.font_url || ''}" placeholder="https://fonts.googleapis.com/css2?..." oninput="updateContainerJSON()">
                        </div>
                        <div class="form-group">
                            <label>Font Size</label>
                            <input type="number" class="c_child_font_size" data-slot="${i}" value="${child.font_size || ''}" placeholder="12" step="0.5" oninput="updateContainerJSON()">
                        </div>
                        <div class="form-group">
                            <label>Font Weight</label>
                            <select class="c_child_font_weight" data-slot="${i}" onchange="updateContainerJSON()">
                                <option value="Regular" ${child.font_weight === 'Regular' ? 'selected' : ''}>Regular</option>
                                <option value="Bold" ${child.font_weight === 'Bold' ? 'selected' : ''}>Bold</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>MQTT Topic</label>
                            <input type="text" class="c_child_mqtt_topic" data-slot="${i}" value="${child.mqtt_topic || ''}" placeholder="e.g. home/eink/temp" oninput="updateContainerJSON()">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            }
            updateContainerJSON();
        }

        function updateContainerJSON() {
            const cols = parseInt(document.getElementById('c_grid_cols').value) || 1;
            const rows = parseInt(document.getElementById('c_grid_rows').value) || 1;
            const gap = parseInt(document.getElementById('c_grid_gap').value) || 8;
            const children = [];

            const types = document.querySelectorAll('.c_child_type');
            const configs = document.querySelectorAll('.c_child_config');
            const fgs = document.querySelectorAll('.c_child_fg');
            const bgs = document.querySelectorAll('.c_child_bg');
            const fontUrls = document.querySelectorAll('.c_child_font_url');
            const fontSizes = document.querySelectorAll('.c_child_font_size');
            const fontWeights = document.querySelectorAll('.c_child_font_weight');
            const mqttTopics = document.querySelectorAll('.c_child_mqtt_topic');

            for (let i = 0; i < types.length; i++) {
                children.push({
                    type: types[i].value,
                    custom_config: configs[i].value,
                    color_fg: fgs[i].value,
                    color_bg: bgs[i].value,
                    font_url: fontUrls[i].value,
                    font_size: parseFloat(fontSizes[i].value) || 0,
                    font_weight: fontWeights[i].value,
                    mqtt_topic: mqttTopics[i].value
                });
            }

            const payload = {
                grid_cols: cols,
                grid_rows: rows,
                gap: gap,
                children: children
            };

            document.getElementById('w_custom_config').value = JSON.stringify(payload, null, 2);
        }

        function updateCalendarJSON() {
            const ox = parseFloat(document.getElementById('cal_circle_offset_x').value) || 0;
            const oy = parseFloat(document.getElementById('cal_circle_offset_y').value) || 0;
            const r = parseFloat(document.getElementById('cal_circle_radius').value) || 12;
            const tx = parseFloat(document.getElementById('cal_text_offset_x').value) || 0;
            const ty = parseFloat(document.getElementById('cal_text_offset_y').value) || 0;

            const payload = {
                circle_offset_x: ox,
                circle_offset_y: oy,
                circle_radius: r,
                text_offset_x: tx,
                text_offset_y: ty
            };
            document.getElementById('w_custom_config').value = JSON.stringify(payload, null, 2);
        }

        function toggleWidgetTypeFields() {
            const type = document.getElementById('widget_type').value;
            const customGroup = document.getElementById('custom_config_group');
            const containerGroup = document.getElementById('container_builder_group');
            const calendarGroup = document.getElementById('calendar_builder_group');
            const topicInput = document.getElementById('w_mqtt_topic');
            const brokerInput = document.getElementById('w_mqtt_broker');

            containerGroup.style.display = 'none';
            calendarGroup.style.display = 'none';

            if (type === 'container') {
                containerGroup.style.display = 'block';
                customGroup.style.display = 'block'; // Keep JSON visible but readable
                
                // Parse existing JSON if any to build container fields
                let cols = 2;
                let rows = 1;
                let gap = 8;
                let children = [];
                try {
                    const rawJson = document.getElementById('w_custom_config').value;
                    if (rawJson) {
                        const parsed = JSON.parse(rawJson);
                        cols = parsed.grid_cols || 2;
                        rows = parsed.grid_rows || 1;
                        gap = parsed.gap || 8;
                        children = parsed.children || [];
                    }
                } catch(e) {}
                
                document.getElementById('c_grid_cols').value = cols;
                document.getElementById('c_grid_rows').value = rows;
                document.getElementById('c_grid_gap').value = gap;
                
                buildContainerForm(children);
                topicInput.removeAttribute('required');
            } else {
                customGroup.style.display = 'block';
                if (type === 'calendar') {
                    calendarGroup.style.display = 'block';
                    customGroup.style.display = 'none';
                    
                    let ox = 0, oy = 0, r = 12, tx = 0, ty = 0;
                    try {
                        const rawJson = document.getElementById('w_custom_config').value;
                        if (rawJson) {
                            const parsed = JSON.parse(rawJson);
                            ox = parsed.circle_offset_x !== undefined ? parsed.circle_offset_x : 0;
                            oy = parsed.circle_offset_y !== undefined ? parsed.circle_offset_y : 0;
                            r = parsed.circle_radius !== undefined ? parsed.circle_radius : 12;
                            tx = parsed.text_offset_x !== undefined ? parsed.text_offset_x : 0;
                            ty = parsed.text_offset_y !== undefined ? parsed.text_offset_y : 0;
                        }
                    } catch(e) {}
                    document.getElementById('cal_circle_offset_x').value = ox;
                    document.getElementById('cal_circle_offset_y').value = oy;
                    document.getElementById('cal_circle_radius').value = r;
                    document.getElementById('cal_text_offset_x').value = tx;
                    document.getElementById('cal_text_offset_y').value = ty;
                    topicInput.removeAttribute('required');
                } else if (type === 'datetime') {
                    document.getElementById('w_custom_config').placeholder = '{"format": "03:04 PM"}';
                    topicInput.removeAttribute('required');
                } else if (type === 'text') {
                    document.getElementById('w_custom_config').placeholder = '{"text": "Your static text"}';
                } else if (type === 'image') {
                    document.getElementById('w_custom_config').placeholder = '{"url": "https://..."}';
                }
            }
        }

        function saveWidget(event) {
            event.preventDefault();
            const id = document.getElementById('widget_id').value;
            const type = document.getElementById('widget_type').value;
            const x = parseInt(document.getElementById('w_x').value);
            const y = parseInt(document.getElementById('w_y').value);
            const w = parseInt(document.getElementById('w_w').value);
            const h = parseInt(document.getElementById('w_h').value);
            const fg = document.getElementById('w_fg').value;
            const bg = document.getElementById('w_bg').value;
            const borderW = parseInt(document.getElementById('w_border_width').value) || 0;
            const borderC = document.getElementById('w_border_color').value;
            const fontUrl = document.getElementById('w_font_url').value;
            const fontSize = parseFloat(document.getElementById('w_font_size').value);
            const fontWeight = document.getElementById('w_font_weight').value;
            const broker = document.getElementById('w_mqtt_broker').value;
            const topic = document.getElementById('w_mqtt_topic').value;
            const custom = document.getElementById('w_custom_config').value;

            const bodyData = {
                id: id,
                canvas_id: currentCanvasID,
                type: type,
                x: x, y: y, width: w, height: h,
                color_fg: fg, color_bg: bg,
                border_width: borderW, border_color: borderC,
                font_url: fontUrl, font_size: fontSize, font_weight: fontWeight,
                mqtt_broker: broker, mqtt_topic: topic,
                custom_config: custom
            };

            fetch('/api/widget', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            })
            .then(res => res.json())
            .then(data => {
                showToast("Widget configurations saved!");
                document.getElementById('widgetEditorCard').style.display = 'none';
                
                // Get canvas dims
                fetch('/api/canvas')
                    .then(res => res.json())
                    .then(list => {
                        const cur = list.find(c => c.id === currentCanvasID);
                        selectCanvas(currentCanvasID, cur ? cur.width : 800, cur ? cur.height : 480, cur);
                    });
            })
            .catch(err => showToast("Failed to save widget configs: " + err));
        }

        function deleteWidget() {
            const id = document.getElementById('widget_id').value;
            if (!confirm("Remove widget " + id + "?")) return;
            fetch(`/api/widget/${id}`, { method: 'DELETE' })
                .then(() => {
                    showToast("Widget removed successfully.");
                    document.getElementById('widgetEditorCard').style.display = 'none';
                    selectCanvas(currentCanvasID);
                });
        }

        function restartServer() {
            if (!confirm("Are you sure you want to restart the dashboard backend server?")) return;
            fetch('/restart', { method: 'POST' })
                .then(() => {
                    showToast("Server is restarting. Please wait a few seconds...");
                })
                .catch(() => showToast("Restart signal sent successfully."));
        }
    </script>
</body>
</html>
